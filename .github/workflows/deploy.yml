name: Deploy Laravel to Zenhost via FTP

on:
  push:
    branches:
      - main # Ubah ke branch yang ingin Anda deploy (contoh: master)

jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4
      with:
        fetch-depth: 2
    
    - name: 🛠️ Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2' # Sesuaikan dengan versi PHP di Zenhost Anda
        extensions: mbstring, xml, ctype, iconv, intl, pdo, pdo_mysql, dom, filter, libxml, openssl
        coverage: none

    - name: 📦 Install Composer Dependencies
      run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist --optimize-autoloader

    - name: ⚙️ Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20' # Sesuaikan dengan versi Node.js yang Anda gunakan

    - name: 📦 Install NPM Dependencies & Build Assets
      run: |
        npm install
        npm run build

    - name: 📂 Sync files
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        server-dir: /public_html/ # Ganti dengan direktori tujuan di Zenhost Anda (misal: /public_html/app/)
        exclude: |
          **/.git*
          **/.git*/**
          **/node_modules/**
          **/tests/**
          .env
          phpunit.xml
